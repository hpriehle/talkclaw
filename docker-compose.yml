services:
  talkclaw:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://talkclaw:talkclaw@db:5432/talkclaw
      - OPENCLAW_URL=${OPENCLAW_URL:-}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-}
      - API_TOKEN=${API_TOKEN:-}
      - DATA_DIR=/data
      - SANDBOX_SOCKET=/sandbox/talkclaw-sandbox.sock
    volumes:
      - app_data:/data
      - sandbox_sock:/sandbox
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_started
    restart: unless-stopped

  sandbox:
    build: ./talkclaw-sandbox
    environment:
      - DATABASE_URL=postgres://talkclaw:talkclaw@db:5432/talkclaw
      - SANDBOX_SOCKET=/sandbox/talkclaw-sandbox.sock
    volumes:
      - sandbox_sock:/sandbox
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=talkclaw
      - POSTGRES_USER=talkclaw
      - POSTGRES_PASSWORD=talkclaw
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talkclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  app_data:
  sandbox_sock:
